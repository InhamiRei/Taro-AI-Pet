<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taro AI Pet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 整个容器 -->
  <div id="app">
    <!-- 对话气泡 -->
    <div id="bubble" class="bubble hidden">
      <div class="bubble-content">
        <span id="bubble-text"></span>
      </div>
      <div class="bubble-tail"></div>
    </div>

    <!-- Live2D 桌宠主体 -->
    <div id="pet-container" class="pet-container">
      <canvas id="live2d-canvas"></canvas>
      <!-- 状态特效 -->
      <div id="effects" class="effects"></div>
    </div>
  </div>

  <!-- Live2D 核心库 -->
  <script src="lib/live2dcubismcore.min.js"></script>
  <!-- PixiJS -->
  <script src="lib/pixi.min.js"></script>
  <!-- pixi-live2d-display -->
  <script src="lib/pixi-live2d-display.min.js"></script>
  <!-- 应用逻辑 -->
  <script src="js/app.js"></script>
</body>
</html>

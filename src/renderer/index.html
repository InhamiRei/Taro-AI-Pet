<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taro AI Pet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 整个容器 -->
  <div id="app">
    <!-- 对话气泡 -->
    <div id="bubble" class="bubble hidden">
      <div class="bubble-content">
        <span id="bubble-text"></span>
      </div>
      <div class="bubble-tail"></div>
    </div>

    <!-- 桌宠主体 -->
    <div id="pet-container" class="pet-container">
      <div id="pet" class="pet" data-state="idle">
        <!-- 耳朵 -->
        <div class="ear ear-left">
          <div class="ear-inner"></div>
        </div>
        <div class="ear ear-right">
          <div class="ear-inner"></div>
        </div>

        <!-- 身体 -->
        <div class="body">
          <!-- 脸部 -->
          <div class="face">
            <!-- 眼睛 -->
            <div class="eye eye-left">
              <div class="pupil"></div>
              <div class="shine"></div>
            </div>
            <div class="eye eye-right">
              <div class="pupil"></div>
              <div class="shine"></div>
            </div>

            <!-- 腮红 -->
            <div class="blush blush-left"></div>
            <div class="blush blush-right"></div>

            <!-- 鼻子 -->
            <div class="nose"></div>

            <!-- 嘴巴 -->
            <div class="mouth"></div>
          </div>
        </div>

        <!-- 尾巴 -->
        <div class="tail"></div>

        <!-- 前爪 -->
        <div class="paw paw-left"></div>
        <div class="paw paw-right"></div>

        <!-- 状态特效 -->
        <div id="effects" class="effects"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
